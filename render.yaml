services:
  - type: web
    name: frontend-monitoramento
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://backend-monitoramento-vsid.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
